<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256,256)">
    <!-- Card shape -->
    <rect x="-120" y="-80" width="240" height="160" rx="16" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
    <rect x="-120" y="-40" width="240" height="40" fill="rgba(255,255,255,0.1)"/>
    <!-- Dollar sign -->
    <text x="0" y="20" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="700">$</text>
    <!-- Sparkle -->
    <circle cx="90" cy="-55" r="6" fill="rgba(255,255,255,0.6)"/>
    <circle cx="100" cy="-35" r="3" fill="rgba(255,255,255,0.4)"/>
  </g>
</svg>
