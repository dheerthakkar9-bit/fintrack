name: Build & Release APK + EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - run: npm ci

      - name: Patch config for static export
        run: |
          sed -i 's/reactStrictMode: true,/reactStrictMode: true,\n  output: "export",/' next.config.js
          sed -i 's/remotePatterns: \[{ protocol: "https", hostname: "images.unsplash.com" }\]/remotePatterns: [{ protocol: "https", hostname: "images.unsplash.com" }], unoptimized: true/' next.config.js

      - run: npx next build

      - run: npx cap add android
      - run: npx cap sync android

      - name: Build APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - run: cp android/app/build/outputs/apk/debug/app-debug.apk FinTrack.apk

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: FinTrack.apk
          if-no-files-found: error

  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Patch config for static export
        shell: bash
        run: |
          sed -i 's/reactStrictMode: true,/reactStrictMode: true,\n  output: "export",/' next.config.js
          sed -i 's/remotePatterns: \[{ protocol: "https", hostname: "images.unsplash.com" }\]/remotePatterns: [{ protocol: "https", hostname: "images.unsplash.com" }], unoptimized: true/' next.config.js

      - run: npx next build

      - run: npm install --save-dev @tauri-apps/cli

      - run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - shell: pwsh
        run: |
          $exe = "src-tauri\target\release\fintrack.exe"
          if (Test-Path $exe) { Copy-Item $exe "FinTrack.exe" -Force }

      - uses: actions/upload-artifact@v4
        with:
          name: exe
          path: FinTrack.exe
          if-no-files-found: warn

  release:
    needs: [build-apk, build-exe]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: apk

      - uses: actions/download-artifact@v4
        with:
          name: exe

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            FinTrack.apk
            FinTrack.exe
          generate_release_notes: true
