name: Build & Release APK + EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: |
          npx next build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease
        continue-on-error: true

      - name: Copy APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk FinTrack.apk || true
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk FinTrack-release.apk || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: |
            FinTrack.apk
            FinTrack-release.apk
          if-no-files-found: warn

  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npx next build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Install Tauri CLI
        run: npm install --save-dev @tauri-apps/cli

      - name: Build EXE
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Copy EXE
        shell: pwsh
        run: |
          $exe = "src-tauri\target\release\fintrack.exe"
          if (Test-Path $exe) { Copy-Item $exe "FinTrack.exe" -Force }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: FinTrack.exe
          if-no-files-found: warn

  release:
    needs: [build-apk, build-exe]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FinTrack.apk
            FinTrack.exe
          generate_release_notes: true
